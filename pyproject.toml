[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
line-length = 100
target-version = "py312"
select = ["E", "F", "I", "N", "UP", "B"]
ignore = ["B008"]  # FastAPI Depends() in function defaults

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
