<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LSP{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/app.css">
  <style>
    :root { --accent: #1f6feb; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request.htmx-indicator { display: inline; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  {% if user %}
  <nav class="bg-slate-900 text-slate-100">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-6">
      <a href="/web/loans" class="font-semibold tracking-tight">LSP</a>
      <a href="/web/loans" class="hover:text-white text-slate-300">Loans</a>
      <a href="/web/loans/new" class="hover:text-white text-slate-300">Board / Convert</a>
      <a href="/web/conversions" class="hover:text-white text-slate-300">Batch Convert</a>
      <span class="ml-auto text-sm text-slate-400">tenant: <span class="text-slate-200">{{ user.tenant_slug }}</span></span>
      <form method="post" action="/web/logout" class="inline">
        <button class="text-sm text-slate-300 hover:text-white">log out</button>
      </form>
    </div>
  </nav>
  {% endif %}

  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
